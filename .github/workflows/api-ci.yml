# Workflow de integracion continua para el modulo API (Spring Boot + Maven)
name: API CI

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  build:
    # Compilacion y verificacion del modulo API
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      # Paso 1: Descarga del codigo fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configuracion del JDK 17 (Temurin)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Paso 3: Cache de dependencias Maven para acelerar builds sucesivos
      - name: Cache de dependencias Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('api/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Paso 4: Compilacion y ejecucion de tests
      - name: Compilar y verificar con Maven
        run: ./mvnw clean verify
