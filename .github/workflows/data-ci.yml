# Workflow de integracion continua para el modulo Data (Node.js + MongoDB)
name: Data CI

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
  pull_request:
    branches: [main]
    paths:
      - 'data/**'

jobs:
  build:
    # Instalacion de dependencias y ejecucion de tests del pipeline de datos
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: data

    steps:
      # Paso 1: Descarga del codigo fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configuracion de Node.js 20
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: data/package-lock.json

      # Paso 3: Instalacion de dependencias
      - name: Instalar dependencias
        run: npm ci

      # Paso 4: Ejecucion de tests
      - name: Ejecutar tests
        run: npm test
