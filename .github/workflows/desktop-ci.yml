# Workflow de integracion continua para el modulo Desktop (JavaFX + Gradle)
name: Desktop CI

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'

jobs:
  build:
    # Compilacion y verificacion del modulo Desktop ERP
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: desktop

    steps:
      # Paso 1: Descarga del codigo fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configuracion del JDK 17 (Temurin)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Paso 3: Cache de dependencias Gradle para acelerar builds sucesivos
      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('desktop/**/*.gradle*', 'desktop/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Paso 4: Compilacion y ejecucion de tests
      - name: Compilar con Gradle
        run: ./gradlew build
