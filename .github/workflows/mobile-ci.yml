# Workflow de integracion continua para el modulo Mobile (React Native + Node.js BFF)
name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  build:
    # Compilacion y tests de los subdirectorios frontend y backend del modulo mobile
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Se ejecuta en paralelo para frontend y backend
        subdirectory: [frontend, backend]

    defaults:
      run:
        working-directory: mobile/${{ matrix.subdirectory }}

    steps:
      # Paso 1: Descarga del codigo fuente
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # Paso 2: Configuracion de Node.js 20
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/${{ matrix.subdirectory }}/package-lock.json

      # Paso 3: Instalacion de dependencias
      - name: Instalar dependencias
        run: npm ci

      # Paso 4: Ejecucion de tests
      - name: Ejecutar tests
        run: npm test
