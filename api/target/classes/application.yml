# Configuración base de la API REST de RehabiAPP.
# Los perfiles (local, aws, production) sobreescriben o complementan estas propiedades.

spring:
  application:
    name: rehabiapp-api

  # Multipart — limite de tamaño para subida de fotos de pacientes (max 5 MB por archivo)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

  # JPA — configuración base; perfiles específicos añaden propiedades adicionales
  jpa:
    # Previene el anti-patrón Open Session in View en todos los entornos
    open-in-view: false
    hibernate:
      # Flyway controla el esquema; Hibernate solo valida en tiempo de arranque
      ddl-auto: none
    properties:
      hibernate:
        # Dialecto PostgreSQL moderno
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Envers — tablas de auditoría controladas por Flyway, no auto-generadas
        envers:
          audit_table_suffix: _audit
          revision_field_name: rev
          revision_type_field_name: rev_type
          store_data_at_delete: true

  # Flyway — migraciones versionadas; falla el arranque si la migración no es limpia
  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate permite aplicar migraciones sobre una BD ya existente
    # (compatibilidad con el esquema del ERP de escritorio)
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

# ======================== SERVIDOR ========================
server:
  # Puerto configurable vía variable de entorno; K8s establece SERVER_PORT=8080
  port: ${SERVER_PORT:8080}
  tomcat:
    # Directorio base de Tomcat en /tmp para compatibilidad con filesystem de solo lectura (K8s)
    basedir: /tmp
  error:
    # El perfil production sobreescribe estos valores para mayor seguridad
    include-stacktrace: always
    include-message: always

# ======================== ACTUATOR / OBSERVABILIDAD ========================
management:
  endpoints:
    web:
      exposure:
        # Expone health (probes K8s), info y prometheus (scraping Prometheus)
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        # Habilita /actuator/health/liveness y /actuator/health/readiness para K8s
        enabled: true
      # No exponer detalles internos en las respuestas de salud
      show-details: never
  health:
    livenessState:
      # Prueba de vida: el pod está vivo si el contexto de Spring arrancó
      enabled: true
    readinessState:
      # Prueba de disponibilidad: el pod acepta tráfico si la BD está lista
      enabled: true

# ======================== RECURSOS WEB ========================
  web:
    resources:
      cache:
        # Sin caché de recursos estáticos — evita conflictos con filesystem de solo lectura
        period: 0

# ======================== CONFIGURACIÓN ESPECÍFICA DE REHABIAPP ========================
rehabiapp:
  data-service:
    # URL del servicio de datos (Node.js + MongoDB) para enrutar telemetría de juegos.
    # K8s establece: REHABIAPP_DATA_SERVICE_URL=http://rehabiapp-data.rehabiapp-data.svc.cluster.local:8081
    url: ${REHABIAPP_DATA_SERVICE_URL:http://localhost:8081}
  security:
    # Clave HMAC-SHA para firma JWT — mínimo 32 bytes.
    # PRODUCCIÓN: inyectada como secreto K8s vía JWT_SIGNING_KEY.
    jwt-signing-key: ${JWT_SIGNING_KEY:dev-jwt-signing-key-placeholder-change-in-production-32chars}
    # Tiempo de vida del access token: 15 minutos (900 000 ms)
    jwt-expiration-ms: 900000
    # Tiempo de vida del refresh token: 7 días (604 800 000 ms)
    jwt-refresh-expiration-ms: 604800000
    # Clave AES-256-GCM para cifrado de campos clínicos — exactamente 32 bytes.
    # PRODUCCIÓN: inyectada como secreto K8s vía ENCRYPTION_KEY.
    encryption-key: ${ENCRYPTION_KEY:dev-encryption-key-placeholder-change-in-production-32c}
