spring:
  datasource:
    url: jdbc:h2:mem:rehabiapp_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    # H2Dialect para base de datos en memoria en tests
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # create-drop crea el esquema al inicio y lo elimina al terminar el contexto
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        # Sobreescribir el dialecto PostgreSQL del application.yml base para usar H2
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    # Flyway usa sintaxis PostgreSQL no compatible con H2 — se desactiva en tests
    enabled: false

# Propiedades de seguridad para tests — valores fijos para reproducibilidad
# Nota: estas claves son SOLO para el entorno de test, nunca para producción
rehabiapp:
  security:
    jwt-signing-key: "test-jwt-signing-key-para-tests-unitarios-64-chars-xxxxxxxxxxxxxxxxx"
    jwt-expiration-ms: 900000
    jwt-refresh-expiration-ms: 604800000
    encryption-key: "test-encryption-key-32-chars!!!!"
