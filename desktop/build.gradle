plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
    // Repositorio oficial de Jaspersoft para dependencias de JasperReports 7
    maven { url 'https://jaspersoft.jfrog.io/jaspersoft/third-party-ce-artifacts/' }
}

javafx {
    // JavaFX 24 es la version que acompaña a JDK 24 (mismo ciclo de releases)
    version = "24"
    modules = ['javafx.controls', 'javafx.graphics', 'javafx.fxml', 'javafx.web', 'javafx.base', 'javafx.swing', 'javafx.media']
}

dependencies {
    // JavaFX Controls - v11.2.2 es estable, pero para Java 24 usamos la rama compatible
    implementation 'org.controlsfx:controlsfx:11.2.2'

    // Jackson para serializar/deserializar JSON con la API REST
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.17.0'

    // JasperReports 7.0.1
    implementation 'net.sf.jasperreports:jasperreports:7.0.1'
    implementation 'net.sf.jasperreports:jasperreports-fonts:7.0.1'
    implementation 'net.sf.jasperreports:jasperreports-functions:7.0.1'
    implementation 'net.sf.jasperreports:jasperreports-chart-themes:7.0.1'
    implementation 'net.sf.jasperreports:jasperreports-pdf:7.0.1'

    // Motor PDF OpenPDF para Jasper 7
    implementation 'com.github.librepdf:openpdf:1.3.30'

    // Logging SLF4J
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'org.slf4j:slf4j-simple:2.0.9'

    // Tests
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.14.2'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.14.2'
    // ByteBuddy 1.15.x soporta Java 24 (class file major version 68)
    testImplementation 'net.bytebuddy:byte-buddy:1.15.10'
    testImplementation 'net.bytebuddy:byte-buddy-agent:1.15.10'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Forzar versiones para evitar el error de mezcla de versiones de JFX
configurations.all {
    resolutionStrategy {
        force 'org.openjfx:javafx-base:24'
        force 'org.openjfx:javafx-graphics:24'
        force 'org.openjfx:javafx-controls:24'
        force 'org.openjfx:javafx-fxml:24'
        force 'org.openjfx:javafx-web:24'
        force 'org.openjfx:javafx-swing:24'
        force 'org.openjfx:javafx-media:24'
    }
}

java {
    toolchain {
        // CAMBIO CRÍTICO: Definimos Java 24 como la versión del proyecto
        languageVersion = JavaLanguageVersion.of(24)
    }
}

application {
    mainClass = 'com.javafx.Clases.Launcher'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

// Configuración de recursos para asegurar que FXML e imágenes se incluyan en el JAR [cite: 52]
sourceSets {
    main {
        resources {
            srcDirs = ["src/main/resources"]
            includes = ["**/*.fxml", "**/*.png", "**/*.jpg", "**/*.gif",
                        "**/*.properties", "**/*.jasper", "**/*.css", "**/*.jrxml", "**/*.xml"]
        }
    }
}

tasks.register('copyDependencies', Copy) {
    from configurations.runtimeClasspath
    into "$buildDir/libs/lib"
}

tasks.jar {
    dependsOn copyDependencies
    manifest {
        attributes(
                'Main-Class': application.mainClass.get(),
                'Class-Path': configurations.runtimeClasspath.files.collect { "lib/" + it.name }.join(' ')
        )
    }
}

// BLOQUE DE ACCESO NATIVO - Crucial para que JasperReports funcione en Java 24
tasks.named('test') {
    useJUnitPlatform()
    jvmArgs += [
            "--add-opens=java.base/java.lang=ALL-UNNAMED",
            "--add-opens=java.base/java.util=ALL-UNNAMED",
            "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
            "--add-opens=java.base/java.text=ALL-UNNAMED",
            "--add-opens=java.desktop/java.awt.font=ALL-UNNAMED",
            // Requerido para Mockito inline mock maker con Java 24
            "-XX:+EnableDynamicAgentLoading",
            "-Xshare:off",
            "--enable-native-access=ALL-UNNAMED"
    ]
}

tasks.withType(JavaExec).configureEach {
    // Apertura de modulos internos para JasperReports y otras libs en Java 24
    jvmArgs += [
            "--add-opens=java.base/java.lang=ALL-UNNAMED",
            "--add-opens=java.base/java.util=ALL-UNNAMED",
            "--add-opens=java.base/java.lang.reflect=ALL-UNNAMED",
            "--add-opens=java.base/java.text=ALL-UNNAMED",
            "--add-opens=java.desktop/java.awt.font=ALL-UNNAMED",
            "--add-opens=java.desktop/java.awt.geom=ALL-UNNAMED",
            "--add-opens=java.base/java.io=ALL-UNNAMED",
            "--enable-native-access=ALL-UNNAMED"
    ]

    // Propagacion de --module-path y --add-modules a TODAS las tareas JavaExec,
    // incluidas las generadas automaticamente por IntelliJ IDEA.
    // Sin esto, IntelliJ falla con "JavaFX runtime components are missing".
    doFirst {
        def fxJars = configurations.runtimeClasspath.files
                .findAll { it.name.startsWith('javafx-') && it.name.endsWith('.jar') }
                .collect { it.absolutePath }
        if (!fxJars.isEmpty()) {
            jvmArgs += [
                    '--module-path', fxJars.join(File.pathSeparator),
                    '--add-modules', 'javafx.controls,javafx.graphics,javafx.fxml,javafx.web,javafx.base,javafx.swing,javafx.media'
            ]
        }
    }
}