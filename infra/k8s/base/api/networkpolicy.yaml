# NetworkPolicy allow-list para el servicio API
# Zero Trust: solo trafico EXPLICITO permitido, todo lo demas bloqueado por default-deny-all
# Topologia permitida (per skill):
#   Internet -> Ingress -> api:8080
#   mobile-bff -> api:8080
#   api -> postgresql:5432 (mismo namespace)
#   api -> rehabiapp-data:8081 (namespace rehabiapp-data)
#   api -> kube-dns:53
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rehabiapp-api-netpol
  namespace: rehabiapp-api
spec:
  podSelector:
    matchLabels:
      app: rehabiapp-api
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Permitir trafico desde el ingress controller (acceso externo)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Permitir trafico desde el mobile backend BFF (patron BFF)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rehabiapp-mobile
          podSelector:
            matchLabels:
              app: mobile-backend
              tier: bff
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Permitir conexion a PostgreSQL (mismo namespace rehabiapp-api)
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
              tier: database
      ports:
        - protocol: TCP
          port: 5432
    # Permitir comunicacion con el servicio de datos (namespace rehabiapp-data)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rehabiapp-data
          podSelector:
            matchLabels:
              app: rehabiapp-data
              tier: backend
      ports:
        - protocol: TCP
          port: 8081
    # Permitir resolucion DNS (obligatorio para descubrimiento de servicios)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
