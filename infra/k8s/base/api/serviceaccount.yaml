# ServiceAccount dedicado para el servicio API
# Cada microservicio tiene su propio ServiceAccount (principio de minimo privilegio)
# La anotacion IRSA se anade en el overlay de AWS (no en base)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rehabiapp-api-sa
  namespace: rehabiapp-api
automountServiceAccountToken: false
