# HorizontalPodAutoscaler para el servicio Data Pipeline
# Escala entre 3 y 4 replicas segun carga de CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rehabiapp-data-hpa
  namespace: rehabiapp-data
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rehabiapp-data
  minReplicas: 3
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
