# Service ClusterIP para el servicio Data Pipeline
# Solo accesible desde la API (servicio interno, sin exposicion al Ingress)
apiVersion: v1
kind: Service
metadata:
  name: rehabiapp-data
  namespace: rehabiapp-data
  labels:
    app: rehabiapp-data
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: rehabiapp-data
    tier: backend
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081
