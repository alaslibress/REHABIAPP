# NetworkPolicy de la API para entorno AWS — REEMPLAZO COMPLETO
# En AWS: PostgreSQL es RDS (CIDR block), no un pod
# Egress a Secrets Manager/KMS via VPC endpoint (CIDR de la VPC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-traffic
  namespace: rehabiapp-api
spec:
  podSelector:
    matchLabels:
      app: rehabiapp-api
      tier: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Permitir trafico desde el ALB Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Permitir trafico desde el mobile backend BFF (patron BFF)
    - from:
        - namespaceSelector:
            matchLabels:
              name: rehabiapp-mobile
          podSelector:
            matchLabels:
              app: mobile-backend
              tier: bff
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Permitir conexion a RDS PostgreSQL (subnet privada de RDS en la VPC)
    - to:
        - ipBlock:
            cidr: 10.0.100.0/24
      ports:
        - protocol: TCP
          port: 5432
    # Permitir comunicacion con el servicio de datos (namespace rehabiapp-data)
    - to:
        - namespaceSelector:
            matchLabels:
              name: rehabiapp-data
          podSelector:
            matchLabels:
              app: rehabiapp-data
              tier: backend
      ports:
        - protocol: TCP
          port: 8081
    # Permitir acceso a AWS Secrets Manager y KMS via VPC endpoint (HTTPS)
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 443
    # Permitir resolucion DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
