# Patch del ServiceAccount del servicio Data para IRSA en AWS
# IRSA vincula el ServiceAccount de Kubernetes al IAM Role de AWS via OIDC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rehabiapp-data-sa
  namespace: rehabiapp-data
  annotations:
    # IRSA: vincula este ServiceAccount al IAM Role con permisos para DocumentDB y Secrets Manager
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/rehabiapp-data-role
