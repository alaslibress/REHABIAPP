# SecretProviderClass para el servicio API
# Mapea secretos de AWS Secrets Manager al pod via CSI Driver
# ENS Alto: secretos NUNCA en etcd de Kubernetes — siempre desde AWS Secrets Manager
# KMS Customer Managed Keys obligatorio (per skill requirement)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: rehabiapp-api-secrets
  namespace: rehabiapp-api
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "rehabiapp/api/db-credentials"
        objectType: "secretsmanager"
        objectAlias: "db-credentials"
      - objectName: "rehabiapp/api/encryption-key"
        objectType: "secretsmanager"
        objectAlias: "encryption-key"
      - objectName: "rehabiapp/api/jwt-signing-key"
        objectType: "secretsmanager"
        objectAlias: "jwt-signing-key"
