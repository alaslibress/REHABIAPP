# SecretProviderClass para el servicio Data Pipeline
# Mapea secretos de AWS Secrets Manager al pod via CSI Driver
# ENS Alto: secretos NUNCA en etcd de Kubernetes — siempre desde AWS Secrets Manager
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: rehabiapp-data-secrets
  namespace: rehabiapp-data
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "rehabiapp/data/mongodb-credentials"
        objectType: "secretsmanager"
        objectAlias: "mongodb-credentials"
      - objectName: "rehabiapp/data/csfle-master-key"
        objectType: "secretsmanager"
        objectAlias: "csfle-master-key"
