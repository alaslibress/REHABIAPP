# SecretProviderClass para el Mobile Backend BFF
# Mapea secretos de AWS Secrets Manager al pod via CSI Driver
# ENS Alto: secretos NUNCA en etcd de Kubernetes — siempre desde AWS Secrets Manager
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: mobile-backend-secrets
  namespace: rehabiapp-mobile
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "rehabiapp/mobile/session-secret"
        objectType: "secretsmanager"
        objectAlias: "session-secret"
