# Patch del Service de la API para entorno local
# Expone el servicio como NodePort para acceso directo desde el host de desarrollo
apiVersion: v1
kind: Service
metadata:
  name: rehabiapp-api
  namespace: rehabiapp-api
spec:
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
