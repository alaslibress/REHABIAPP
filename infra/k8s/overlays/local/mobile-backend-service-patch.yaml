# Patch del Service del Mobile Backend para entorno local
# Expone el servicio como NodePort para acceso directo desde el host de desarrollo
apiVersion: v1
kind: Service
metadata:
  name: mobile-backend
  namespace: rehabiapp-mobile
spec:
  type: NodePort
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300
