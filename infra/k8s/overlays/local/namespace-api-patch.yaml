# Patch del namespace rehabiapp-api para entorno local
# Relaja PSS enforce a baseline para compatibilidad con imagen Bitnami PostgreSQL
apiVersion: v1
kind: Namespace
metadata:
  name: rehabiapp-api
  labels:
    name: rehabiapp-api
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
