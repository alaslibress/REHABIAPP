# Patch del namespace rehabiapp-data para entorno local
# Relaja PSS enforce a baseline para compatibilidad con imagen Bitnami MongoDB
apiVersion: v1
kind: Namespace
metadata:
  name: rehabiapp-data
  labels:
    name: rehabiapp-data
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
